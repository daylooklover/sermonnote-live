
<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>설교문 작성</title>
<style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            color: #333;
        }
        .container {
            display: flex;
            height: 100vh;
            padding: 20px;
        }
        .left-panel, .right-panel {
            padding: 20px;
            margin: 10px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .left-panel {
            width: 30%;
        }
        .right-panel {
            width: 70%;
        }
        button {
            padding: 10px;
            background-color: #4CAF50;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 20px;
            width: 100%;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>

<style>
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-30px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}
.fade-in {
  animation: fadeIn 1s ease-out forwards;
}
.slide-left {
  animation: slideInLeft 1s ease-out forwards;
}
.slide-right {
  animation: slideInRight 1s ease-out forwards;
}
.stagger-container > * {
  opacity: 0;
  animation: fadeIn 1s ease-out forwards;
}
.stagger-container > *:nth-child(1) { animation-delay: 0.3s; }
.stagger-container > *:nth-child(2) { animation-delay: 0.6s; }
.stagger-container > *:nth-child(3) { animation-delay: 0.9s; }
</style>
</head>
<body>
<div class="container fade-in">
<div class="left-panel fade-in">
<h3>설교 제목</h3>
<input placeholder="설교 제목 입력" type="text"/>
<h3>설교 시간</h3>
<input type="time"/>
<h3>설교 대상</h3>
<input placeholder="설교 대상 입력" type="text"/>
</div>
<div class="right-panel fade-in">
<h3>설교 내용</h3>
<textarea placeholder="설교 내용을 작성하세요" rows="10"></textarea>
</div>
</div>
<button class="fade-in">설교 저장</button>
</body>
</html>
